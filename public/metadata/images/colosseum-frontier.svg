<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Holographic conic border -->
    <linearGradient id="holo" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34F198" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#9945FF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#34F198" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Center halo -->
    <radialGradient id="halo" cx="512" cy="420" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34F198" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#9945FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <!-- Card surface -->
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#070707"/>
    </linearGradient>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <!-- Issuer glyph shadow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#050505"/>
  <rect width="1024" height="1024" fill="url(#dots)"/>
  <rect width="1024" height="1024" fill="url(#halo)"/>

  <!-- Card body with rounded holo border -->
  <rect x="24" y="24" width="976" height="976" rx="48" fill="url(#surface)" stroke="url(#holo)" stroke-width="2.5"/>
  <rect x="32" y="32" width="960" height="960" rx="42" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Top status row -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="22" letter-spacing="4">
    <rect x="72" y="76" width="280" height="46" rx="23" fill="#34F198" fill-opacity="0.10" stroke="#34F198" stroke-opacity="0.55"/>
    <circle cx="100" cy="99" r="6" fill="#34F198"/>
    <text x="120" y="107" fill="#34F198">ON-CHAIN CRED</text>
    <text x="952" y="107" fill="#9a9a9a" text-anchor="end">SOLANA</text>
  </g>

  <!-- Issuer glyph badge -->
  <g transform="translate(412, 200)">
    <rect width="200" height="200" rx="36" fill="#0c0c0c" stroke="#9945FF" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="6" y="6" width="188" height="188" rx="30" fill="none" stroke="#34F198" stroke-opacity="0.18" stroke-width="1"/>
    <text x="100" y="120" fill="#34F198" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="78" font-weight="700" text-anchor="middle" letter-spacing="-3" filter="url(#glow)">COL</text>
    <text x="100" y="162" fill="#9a9a9a" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14" text-anchor="middle" letter-spacing="3">ISSUER</text>
  </g>

  <!-- Title -->
  <g font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" text-anchor="middle" letter-spacing="-2.5" fill="#fafafa">
    <text x="512" y="490" font-size="66">Solana Frontier —</text>
    <text x="512" y="566" font-size="66">Colosseum</text>
  </g>

  <!-- Program -->
  <text x="512" y="612" text-anchor="middle" fill="#34F198" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20" letter-spacing="5">HACKATHON</text>

  <!-- Issuer caps -->
  <text x="512" y="656" text-anchor="middle" fill="#9a9a9a" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="22" letter-spacing="6">COLOSSEUM</text>

  <!-- Attributes strip -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="18" letter-spacing="3">
    
    <line x1="120" y1="708" x2="904" y2="708" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="120" y="730" fill="#9a9a9a">EVENT</text>
    <text x="904" y="730" fill="#fafafa" text-anchor="end" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" letter-spacing="-0.5">Solana Frontier</text>
    <line x1="120" y1="750" x2="904" y2="750" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="120" y="772" fill="#9a9a9a">PROJECT</text>
    <text x="904" y="772" fill="#fafafa" text-anchor="end" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" letter-spacing="-0.5">Structa.finance</text>
    <line x1="120" y1="792" x2="904" y2="792" stroke="#ffffff" stroke-opacity="0.05"/>
    <text x="120" y="814" fill="#9a9a9a">STACK</text>
    <text x="904" y="814" fill="#fafafa" text-anchor="end" font-family="system-ui, -apple-system, Helvetica, Arial, sans-serif" letter-spacing="-0.5">Anchor · USDC · React</text>
    <line x1="120" y1="834" x2="904" y2="834" stroke="#ffffff" stroke-opacity="0.05"/>
  </g>

  <!-- Bottom bar: date · soulbound · serial -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="22" letter-spacing="5">
    <text x="72" y="956" fill="#9a9a9a">2025-Q2</text>
    <g transform="translate(512, 938)">
      <rect x="-130" y="0" width="260" height="40" rx="20" fill="#9945FF" fill-opacity="0.12" stroke="#9945FF" stroke-opacity="0.55"/>
      <text x="0" y="27" fill="#9945FF" text-anchor="middle">◇ SOULBOUND</text>
    </g>
    <text x="952" y="956" fill="#9a9a9a" text-anchor="end">02 / 07</text>
  </g>

  <!-- Top-left chain dot -->
  <g transform="translate(56, 56)" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14" letter-spacing="2">
    <circle cx="0" cy="0" r="6" fill="#9945FF"/>
    <text x="14" y="5" fill="#9945FF">SOL</text>
  </g>

  <!-- Lucas signature corner -->
  <text x="56" y="996" fill="#5a5a5a" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14" letter-spacing="4">LUCAS DE ALMEIDA · LDA.ON-CHAIN</text>
</svg>
